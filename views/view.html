<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
    <h2>E-Cell</h2>
    <div>
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </div>
</nav>

<div class="container">
    <h2 class="center">All Tasks</h2>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Date</th>
                <th>File</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="taskTable"></tbody>
    </table>
</div>

<script>
let isAdmin = false;

// 🔥 Step 1: Check admin status
fetch("/check-admin")
    .then(res => res.json())
    .then(data => {
        isAdmin = data.isAdmin;
        loadTasks();
    });

// 🔥 Step 2: Load tasks
function loadTasks() {
    fetch("/tasks")
        .then(res => res.json())
        .then(data => {
            let html = "";

            data.forEach(task => {
                html += `
                    <tr>
                        <td>${task.title}</td>
                        <td>${task.description}</td>
                        <td>${task.date}</td>
                        <td>
                            ${task.file_path ? `<a href="/uploads/${task.file_path}" target="_blank">View</a>` : "No File"}
                        </td>
                        <td>
                            ${isAdmin ? `<a href="/delete/${task.id}" style="color:red;">Delete</a>` : ""}
                        </td>
                    </tr>
                `;
            });

            document.getElementById("taskTable").innerHTML = html;
        });
}
</script>

</body>
</html>
